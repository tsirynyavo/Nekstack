<!DOCTYPE html>
<html lang="fr" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fianara Smart City</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { 
        background: radial-gradient(ellipse at 20% 30%, #0a0a0a, #000000);
        min-height: 100vh;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
      }
      
      /* Animation de grain de film */
      .noise::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: repeating-radial-gradient(circle at 20% 30%, #000, #000 2px, transparent 2px, transparent 4px);
        opacity: 0.03;
        pointer-events: none;
        z-index: 999;
      }
      
      /* Scanline effect */
      .scanline {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(to bottom, transparent 50%, rgba(0, 255, 255, 0.03) 50%);
        background-size: 100% 4px;
        pointer-events: none;
        z-index: 998;
        animation: scanline 8s linear infinite;
      }
      
      @keyframes scanline {
        0% { transform: translateY(-100%); }
        100% { transform: translateY(100%); }
      }
    </style>
  </head>
  <body>
    <div class="noise"></div>
    <div class="scanline"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
